{% extends 'main/base.html' %}
{% load static %}

{% block title %}
إضافة مكان دعم
{% endblock %}

{% block style %}
<link rel="stylesheet" href="{% static 'support_map/css/style.css' %}">
{% endblock %}

{% block content %}

<div class="create-page">

    <h1 class="page-title">
        إضافة مكان دعم جديد
    </h1>

    <p class="page-subtitle">
        أضف مركزًا أو جهة تقدم خدمات لأطفال اضطراب طيف التوحد
    </p>

    <div class="create-card">

        <form method="POST">

            {% csrf_token %}

            <!-- NAME -->

            <div class="form-group">

                <label class="form-label">
                    اسم المكان
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-input"
                    placeholder="مثال: مركز احتواء"
                >

            </div>

            <!-- CITY -->

            <div class="form-group">

                <label class="form-label">
                    المنطقة
                </label>

                <select
                    name="region"
                    class="form-select"
                >

                    <option value="">
                        اختر المنطقة
                    </option>

                    {% for value, label in regions %}

                    <option value="{{ value }}">
                        {{ label }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <!-- ADDRESS -->

            <div class="form-group">

                <label class="form-label">
                    العنوان
                </label>

                <textarea
                    name="address"
                    class="form-textarea"
                    placeholder="اكتب العنوان بالتفصيل..."
                ></textarea>

            </div>

            <!-- DESCRIPTION -->

            <div class="form-group">

                <label class="form-label">
                    وصف المكان
                </label>

                <textarea
                    name="description"
                    class="form-textarea"
                    placeholder="نبذة عن الخدمات المقدمة..."
                ></textarea>

            </div>

            <!-- PHONE -->

            <div class="form-group">

                <label class="form-label">
                    رقم التواصل
                </label>

                <input
                    type="text"
                    name="phone_number"
                    class="form-input"
                    placeholder="05xxxxxxxx"
                >

            </div>

            <!-- WEBSITE -->

            <div class="form-group">

                <label class="form-label">
                    الموقع الإلكتروني
                </label>

                <input
                    type="url"
                    name="website"
                    class="form-input"
                    placeholder="https://example.com"
                >

            </div>

            <!-- PLACE TYPE -->

            <div class="form-group">

            <label class="form-label">
                نوع المكان
            </label>
            <select name="place_type" class="form-select">
                <option value="">
                    اختر النوع
                </option>
                {% for value, label in place_types %}
                <option value="{{ value }}">
                    {{ label }}
                </option>
                {% endfor %}
            </select>

        </div>
            <!-- X POSITION -->
            <div class="form-group">
                <label class="form-label">
                    الموقع الأفقي (X)
                </label>
                <input
                    type="number"
                    name="x_position"
                    class="form-input"
                    placeholder="420"
                >
            </div>

            <!-- Y POSITION -->

            <div class="form-group">

                <label class="form-label">
                    الموقع العمودي (Y)
                </label>

                <input
                    type="number"
                    name="y_position"
                    class="form-input"
                    placeholder="210"
                >

            </div>

            <!-- ACTIONS -->

            <div class="actions">

                <a
                    href="javascript:history.back()"
                    class="cancel-btn"
                >
                    إلغاء
                </a>

                <button
                    type="submit"
                    class="publish-btn"
                >
                    إضافة المكان
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
